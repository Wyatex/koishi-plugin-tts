name: Publish to NPM

on:
  push:
    tags:
      - 'v*' # 仅当推送类似 v1.2.2 的 tag 时触发，避免误发
  workflow_dispatch: # 保留手动触发的后门，应对紧急热修复

jobs:
  publish:
    runs-on: ubuntu-latest
    # 赋予 GITHUB_TOKEN 写入 id-token 的权限，用于 npm provenance (来源证明)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 建议修改为你本地实际使用的 pnpm 版本，如 8 或 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x' 
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}